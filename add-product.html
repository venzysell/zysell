<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Publier un produit - Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#0057ff;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
width:42px;
height:42px;
}

.container{
max-width:1100px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
border-radius:18px;
padding:25px;
margin-bottom:25px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:20px;
color:#0057ff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#444;
}

input,
textarea,
select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
outline:none;
}

textarea{
resize:vertical;
min-height:130px;
}

input[type=file]{
padding:10px;
}

@media(max-width:768px){

.container{
padding:15px;
}

}

</style>

</head><body>

<header>

<div class="brand">

<img src="logo.png" alt="Logo Zysell">

<h2>Zysell</h2>

</div>

<button onclick="location.href='home.html'">

🏠 Tableau de bord

</button>

</header>

<div class="container">

<div class="card">

<h2>📦 Informations générales</h2>

<div class="grid">

<div>

<label>Nom du produit</label>

<input type="text" id="productName" placeholder="Ex : Formation ChatGPT Pro">

</div>

<div>

<label>Sous-titre (optionnel)</label>

<input type="text" id="subtitle" placeholder="Ex : De débutant à expert">

</div>

<div>

<label>Catégorie</label>

<select id="category">

<option>Formation</option>

<option>eBook</option>

<option>PDF</option>

<option>Vidéo</option>

<option>Audio</option>

<option>Logiciel</option>

<option>Application</option>

<option>Template</option>

<option>Code source</option>

<option>Pack de ressources</option>

<option>Autre</option>

</select>

</div>

<div>

<label>Prix normal (FCFA)</label>

<input type="number" id="price">

</div>

<div>

<label>Prix promotionnel (optionnel)</label>

<input type="number" id="salePrice">

</div>

<div>

<label>Langue</label>

<select id="language">

<option>Français</option>

<option>English</option>

<option>Español</option>

<option>Autre</option>

</select>

</div>

</div>

</div>

<div class="card">

<h2>📝 Description</h2>

<label>Description courte</label>

<textarea id="shortDescription"
placeholder="Résumé affiché dans la boutique..."></textarea>

<label>Description complète</label>

<textarea id="description"
placeholder="Décrivez votre produit en détail..."></textarea>

</div>

<div class="card">

<h2>🖼️ Médias</h2>

<div class="grid">

<div>

<label>Image de couverture</label>

<input type="file"
id="coverImage"
accept="image/*">

</div>

<div>

<label>Galerie d'images (optionnel)</label>

<input type="file"
id="galleryImages"
accept="image/*"
multiple>

</div>

<div>

<label>Vidéo de démonstration (optionnel)</label>

<input type="file"
id="demoVideo"
accept="video/*">

</div>

</div>

</div>

<div class="card">

<h2>📁 Produit numérique</h2>

<div class="grid">

<div>

<label>Fichier principal</label>

<input type="file"
id="productFile">

</div>

<div>

<label>Aperçu gratuit (optionnel)</label>

<input type="file"
id="previewFile">

</div>

<div>

<label>Fichier bonus (optionnel)</label>

<input type="file"
id="bonusFile">

</div>

</div>

</div>

<div class="card">

<h2>⚙️ Informations complémentaires</h2>

<div class="grid">

<div>

<label>Version</label>

<input type="text"
id="version"
placeholder="1.0.0">

</div>

<div>

<label>Compatibilité</label>

<input type="text"
id="compatibility"
placeholder="Windows, Android, macOS...">

</div>

<div>

<label>Mots-clés</label>

<input type="text"
id="keywords"
placeholder="marketing, IA, vidéo...">

</div>

<div>

<label>URL personnalisée (Slug)</label>

<input type="text"
id="slug"
placeholder="formation-chatgpt-pro">

</div>

</div>

</div>

<div class="card">

<h2>🚀 Publication</h2>

<div class="grid">

<div>

<label>Statut</label>

<select id="status">

<option value="draft">Brouillon</option>

<option value="published">Publier immédiatement</option>

</select>

</div>

<div>

<label>Autoriser les avis</label>

<select id="reviews">

<option value="yes">Oui</option>

<option value="no">Non</option>

</select>

</div>

</div>

<br>

<button id="publishProduct">

🚀 Publier le produit

</button>

</div>

</div>
