<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ajouter un produit | Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
textarea,
select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

textarea{
resize:vertical;
min-height:120px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#1d7cff;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.preview{
margin-top:20px;
display:none;
}

.preview img{
width:100%;
border-radius:15px;
}

</style>

</head><body>

<div class="container">

<h1>Ajouter un produit</h1>

<form id="productForm">

<div class="input-group">
<label>📸 Image du produit</label>
<input type="file" id="productImage" accept="image/*">
</div>

<div class="preview" id="preview">
<img id="previewImg" alt="Aperçu du produit">
</div>

<div class="input-group">
<label>🏷️ Nom du produit</label>
<input
type="text"
id="productName"
placeholder="Ex : Formation ChatGPT Premium"
required>
</div>

<div class="input-group">
<label>📝 Description</label>
<textarea
id="description"
placeholder="Décrivez votre produit..."
required></textarea>
</div>

<div class="input-group">
<label>📂 Catégorie</label>
<select id="category" required>
<option value="">Sélectionner une catégorie</option>
<option>Formation</option>
<option>E-book</option>
<option>Logiciel</option>
<option>Template</option>
<option>Musique</option>
<option>Vidéo</option>
<option>Photo</option>
<option>Design</option>
<option>Application</option>
<option>Service</option>
<option>Autre</option>
</select>
</div>

<div class="input-group">
<label>💰 Prix</label>
<input
type="number"
id="price"
placeholder="16000"
required>
</div>

<div class="input-group">
<label>💱 Devise</label>
<select id="currency">
<option>FCFA</option>
<option>USD</option>
<option>EUR</option>
<option>GBP</option>
<option>CDF</option>
<option>NGN</option>
</select>
</div>

<div class="input-group">
<label>📎 Fichier numérique (facultatif)</label>
<input
type="file"
id="productFile">
</div>

<div class="input-group">
<label>🏷️ Promotion (%)</label>
<input
type="number"
id="discount"
placeholder="0">
</div>

<div class="input-group">
<label>🔖 Code promo (facultatif)</label>
<input
type="text"
id="coupon"
placeholder="Ex : VENZY10">
</div>

<div class="input-group">
<label>📦 Type de produit</label>
<select id="productType">
<option>Produit numérique</option>
<option>Produit physique</option>
</select>
</div>

<button type="submit">
🚀 Publier le produit
</button>

</form>

</div>

<script>

const imageInput=document.getElementById("productImage");
const preview=document.getElementById("preview");
const previewImg=document.getElementById("previewImg");

imageInput.addEventListener("change",function(){

const file=this.files[0];

if(file){

preview.style.display="block";

previewImg.src=URL.createObjectURL(file);

}

});

</script><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAYuh-EnlgQjlqgBO2HFFeC5Y5uH4TrEds",
authDomain: "zysell-86604.firebaseapp.com",
projectId: "zysell-86604",
storageBucket: "zysell-86604.firebasestorage.app",
messagingSenderId: "567755208394",
appId: "1:567755208394:web:754d1eec59cf8a659b2633",
measurementId: "G-Y95H3VL447"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const imageInput = document.getElementById("productImage");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");

imageInput.addEventListener("change", () => {

const file = imageInput.files[0];

if(file){

preview.style.display = "block";
previewImg.src = URL.createObjectURL(file);

}

});

document.getElementById("productForm").addEventListener("submit", async (e)=>{

e.preventDefault();

const user = auth.currentUser;

if(!user){

alert("Veuillez vous connecter.");

window.location.href="login.html";

return;

}

try{

await addDoc(collection(db,"products"),{

uid:user.uid,

productName:document.getElementById("productName").value,

description:document.getElementById("description").value,

category:document.getElementById("category").value,

price:Number(document.getElementById("price").value),

currency:document.getElementById("currency").value,

discount:Number(document.getElementById("discount").value)||0,

coupon:document.getElementById("coupon").value,

productType:document.getElementById("productType").value,

image:"",

file:"",

createdAt:serverTimestamp()

});

alert("Produit publié avec succès !");

window.location.href="home.html";

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
