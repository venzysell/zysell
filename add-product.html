<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ajouter un produit | Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fc;
color:#222;
}

header{
background:#fff;
padding:15px 20px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

header img{
width:45px;
height:45px;
object-fit:contain;
}

header h2{
color:#0057ff;
font-size:24px;
font-weight:700;
}

.container{
max-width:800px;
margin:30px auto;
padding:20px;
}

.card{
background:#fff;
border-radius:20px;
padding:25px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.card h1{
margin-bottom:20px;
font-size:28px;
color:#0057ff;
}

.upload-box{
border:2px dashed #0057ff;
border-radius:18px;
padding:35px;
text-align:center;
cursor:pointer;
margin-bottom:20px;
background:#f8fbff;
}

.upload-box img{
width:120px;
height:120px;
object-fit:cover;
display:none;
margin:auto;
border-radius:12px;
}

.upload-box p{
margin-top:10px;
color:#666;
}

input,
textarea,
select{
width:100%;
padding:15px;
margin-top:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
outline:none;
}

textarea{
resize:vertical;
min-height:130px;
}

button{
width:100%;
padding:16px;
margin-top:25px;
border:none;
border-radius:30px;
background:#0057ff;
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

#loading{
display:none;
text-align:center;
margin-top:15px;
color:#0057ff;
font-weight:600;
}

</style>

</head><body>

<header>

<img src="logo.png" alt="Logo Zysell">

<h2>Zysell</h2>

</header>

<div class="container">

<div class="card">

<h1>Ajouter un produit</h1>

<form id="productForm">

<label class="upload-box">

<input type="file" id="productImage" accept="image/*" hidden>

<img id="previewImage">

<p>📷 Cliquez ici pour choisir une image du produit</p>

</label>

<input
type="text"
id="productName"
placeholder="Nom du produit"
required>

<input
type="number"
id="productPrice"
placeholder="Prix"
required>

<select id="productCategory" required>

<option value="">Choisir une catégorie</option>

<option>Électronique</option>

<option>Mode</option>

<option>Beauté</option>

<option>Maison</option>

<option>Informatique</option>

<option>Téléphones</option>

<option>Sport</option>

<option>Automobile</option>

<option>Alimentation</option>

<option>Autre</option>

</select>

<input
type="number"
id="productStock"
placeholder="Quantité en stock"
required>

<textarea
id="productDescription"
placeholder="Description du produit"
required></textarea>

<button type="submit">

Publier le produit

</button>

<div id="loading">

Publication en cours...

</div>

</form>

</div>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAYuh-EnlgQjlqgBO2HFFeC5Y5uH4TrEds",
authDomain:"zysell-86604.firebaseapp.com",
projectId:"zysell-86604",
storageBucket:"zysell-86604.firebasestorage.app",
messagingSenderId:"567755208394",
appId:"1:567755208394:web:754d1eec59cf8a659b2633"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{
if(!user){
location.href="login.html";
return;
}
currentUser = user;
});

productImage.addEventListener("change",()=>{

const file = productImage.files[0];

if(file){

previewImage.src = URL.createObjectURL(file);

previewImage.style.display = "block";

}

});

productForm.addEventListener("submit",async(e)=>{

e.preventDefault();

if(!currentUser){

alert("Veuillez vous reconnecter.");

return;

}

loading.style.display="block";

try{

await addDoc(collection(db,"products"),{

uid:currentUser.uid,

name:productName.value,

price:Number(productPrice.value),

category:productCategory.value,

stock:Number(productStock.value),

description:productDescription.value,

image:"",

createdAt:serverTimestamp()

});

alert("Produit publié avec succès.");

location.href="home.html";

}catch(error){

loading.style.display="none";

alert(error.message);

}

});

</script>

</body>

</html>
