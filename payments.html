<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Paiements - Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#0057ff;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
width:42px;
height:42px;
}

.container{
padding:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:22px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h4{
color:#777;
margin-bottom:10px;
}

.card h2{
color:#0057ff;
}

.actions{
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.actions button{
background:#0057ff;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.history{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.row{
display:grid;
grid-template-columns:1.5fr 1fr 1fr 1fr;
padding:15px;
border-bottom:1px solid #eee;
align-items:center;
}

.head{
background:#0057ff;
color:white;
font-weight:600;
}

.success{
color:#0a8f3d;
font-weight:600;
}

.pending{
color:#d58a00;
font-weight:600;
}

.failed{
color:#d60000;
font-weight:600;
}

@media(max-width:800px){

.row{
grid-template-columns:1fr;
gap:10px;
}

}

</style>

</head><body>

<header>

<div class="brand">

<img src="logo.png" alt="Logo Zysell">

<h2>Zysell</h2>

</div>

<button onclick="location.href='dashboard.html'">

🏠 Tableau de bord

</button>

</header>

<div class="container">

<div class="cards">

<div class="card">

<h4>Solde disponible</h4>

<h2 id="availableBalance">

0 FCFA

</h2>

</div>

<div class="card">

<h4>Revenus totaux</h4>

<h2 id="totalIncome">

0 FCFA

</h2>

</div>

<div class="card">

<h4>Retraits effectués</h4>

<h2 id="totalWithdrawals">

0 FCFA

</h2>

</div>

<div class="card">

<h4>Paiements reçus</h4>

<h2 id="paymentsCount">

0

</h2>

</div>

</div>

<div class="actions">

<button id="withdrawBtn">

💳 Demander un retrait

</button>

<button id="refreshBtn">

🔄 Actualiser

</button>

</div>

<div class="history">

<div class="row head">

<div>Description</div>

<div>Montant</div>

<div>Statut</div>

<div>Date</div>

</div>

<div id="paymentsList">

<div class="row">

<div>Chargement des paiements...</div>

<div>--</div>

<div class="pending">

...

</div>

<div>--</div>

</div>

</div>

</div>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAYuh-EnlgQjlqgBO2HFFeC5Y5uH4TrEds",
authDomain:"zysell-86604.firebaseapp.com",
projectId:"zysell-86604",
storageBucket:"zysell-86604.firebasestorage.app",
messagingSenderId:"567755208394",
appId:"1:567755208394:web:754d1eec59cf8a659b2633"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let balance=0;

async function loadPayments(user){

const q=query(
collection(db,"payments"),
where("sellerId","==",user.uid)
);

const snap=await getDocs(q);

paymentsList.innerHTML="";

let income=0;
let withdrawals=0;
let count=0;

if(snap.empty){

paymentsList.innerHTML=`
<div class="row">
<div>Aucun paiement</div>
<div>0 FCFA</div>
<div class="pending">-</div>
<div>-</div>
</div>
`;

availableBalance.textContent="0 FCFA";
totalIncome.textContent="0 FCFA";
totalWithdrawals.textContent="0 FCFA";
paymentsCount.textContent="0";
return;

}

snap.forEach(doc=>{

const p=doc.data();

count++;

if(p.type==="income"){
income+=Number(p.amount||0);
}

if(p.type==="withdrawal"){
withdrawals+=Number(p.amount||0);
}

paymentsList.innerHTML+=`

<div class="row">

<div>${p.description||"Paiement"}</div>

<div>${Number(p.amount||0)} FCFA</div>

<div class="${(p.status||"pending").toLowerCase()}">

${p.status||"En attente"}

</div>

<div>${p.date||"-"}</div>

</div>

`;

});

balance=income-withdrawals;

availableBalance.textContent=balance+" FCFA";
totalIncome.textContent=income+" FCFA";
totalWithdrawals.textContent=withdrawals+" FCFA";
paymentsCount.textContent=count;

}

onAuthStateChanged(auth,user=>{

if(!user){
location.href="login.html";
return;
}

loadPayments(user);

refreshBtn.onclick=()=>{
loadPayments(user);
};

withdrawBtn.onclick=async()=>{

if(balance<=0){
alert("Votre solde est insuffisant.");
return;
}

await addDoc(collection(db,"payments"),{

sellerId:user.uid,
type:"withdrawal",
amount:balance,
description:"Demande de retrait",
status:"pending",
date:new Date().toLocaleDateString(),
createdAt:serverTimestamp()

});

alert("Votre demande de retrait a été envoyée.");

loadPayments(user);

};

});

</script>

</body>

</html>
