<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zysell Dashboard V3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0b1020;color:#fff}
header{position:sticky;top:0;background:#11182f;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #26304d}
#menuBtn,#profile{font-size:26px;cursor:pointer}
.logo{font-size:28px;font-weight:bold}
.drawer{position:fixed;left:-260px;top:0;width:250px;height:100%;background:#141d36;padding:20px;transition:.3s;z-index:10}
.drawer.open{left:0}
.drawer a{display:block;color:#dce4ff;text-decoration:none;padding:14px 10px;border-radius:10px;margin:8px 0}
.drawer a:hover{background:#305cff}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9}
.overlay.show{display:block}
main{padding:18px}
.search{background:#1a2545;border-radius:12px;padding:14px;color:#93a3cf;margin-bottom:18px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card,.panel{background:#182443;border-radius:18px;padding:18px}
.card h4{color:#b7c4e5;margin-bottom:8px}
.panel{margin-top:18px}
.btn{display:inline-block;margin:12px 0;background:#3563ff;color:#fff;text-decoration:none;padding:12px 18px;border-radius:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #2f3b61;text-align:left}
@media(max-width:560px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="drawer" id="drawer">
<h2>ZySell</h2>
<a href="#">🏠 Tableau de bord</a>
<a href="#">📦 Produits</a>
<a href="#">🛒 Commandes</a>
<a href="#">💳 Paiements</a>
<a href="#">📈 Statistiques</a>
<a href="#">⚙️ Paramètres</a>
<a href="#">🚪 Déconnexion</a>
</div>
<div class="overlay" id="overlay"></div>
<header>
<div id="menuBtn">☰</div>
<div class="logo">ZySell</div>
<div id="profile">👤</div>
</header>
<main>
<div class="search">🔍 Rechercher...</div>
<div class="cards">
<div class="card"><h4>Chiffre d'affaires</h4><h2>0 FCFA</h2></div>
<div class="card"><h4>Produits</h4><h2>0</h2></div>
<div class="card"><h4>Commandes</h4><h2>0</h2></div>
<div class="card"><h4>Clients</h4><h2>0</h2></div>
</div>
<div class="panel">
<h2>Produits récents</h2>
<a href="#" class="btn">+ Ajouter un produit</a>
<table>
<tr><th>Produit</th><th>Prix</th><th>Statut</th></tr>
<tr><td>Aucun</td><td>—</td><td>Brouillon</td></tr>
</table>
</div>
</main>
<script>
const d=document.getElementById('drawer');
const o=document.getElementById('overlay');
menuBtn.onclick=()=>{d.classList.add('open');o.classList.add('show');}
o.onclick=()=>{d.classList.remove('open');o.classList.remove('show');}
</script>
</body></html>
