<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion | Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#284cff 0%,#0d1738 45%,#060b18 100%);
overflow:hidden;
color:white;
}

body::before{
content:"";
position:absolute;
width:650px;
height:650px;
border-radius:50%;
background:rgba(0,153,255,.18);
filter:blur(120px);
top:-200px;
right:-150px;
}

body::after{
content:"";
position:absolute;
width:550px;
height:550px;
border-radius:50%;
background:rgba(123,44,255,.18);
filter:blur(120px);
bottom:-200px;
left:-150px;
}

.card{
position:relative;
z-index:2;
width:95%;
max-width:450px;
padding:45px;
border-radius:28px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 60px rgba(0,0,0,.35);
text-align:center;
}

.logo{
width:110px;
margin-bottom:20px;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
color:#d5d5d5;
margin-bottom:30px;
line-height:1.6;
}

.input-group{
margin-bottom:18px;
text-align:left;
}

.input-group label{
display:block;
margin-bottom:8px;
font-size:14px;
}

.input-group input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.12);
color:white;
font-size:15px;
}

.password-box{
position:relative;
}

.toggle{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#ddd;
}

.login{
width:100%;
padding:17px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#1d7cff,#7b2cff);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.error{
display:none;
margin-top:15px;
color:#ff8b8b;
font-size:14px;
}

</style>

</head><body>

<div class="card">

<img src="logo.png" class="logo" alt="Zysell">

<h1>Connexion</h1>

<p class="subtitle">
Connectez-vous à votre compte Zysell.
</p>

<form id="loginForm">

<div class="input-group">

<label>Adresse e-mail</label>

<input
type="email"
id="email"
placeholder="exemple@email.com"
required>

</div>

<div class="input-group">

<label>Mot de passe</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Votre mot de passe"
required>

<span
class="toggle"
onclick="togglePassword()">
Afficher
</span>

</div>

</div>

<div
class="error"
id="error">
</div>

<button
type="submit"
class="login">

Se connecter

</button>

</form>

<div class="separator">

<span>OU</span>

</div>

<button
class="google-btn"
id="googleLogin">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
alt="Google">

Continuer avec Google

</button>

<div class="bottom">

Vous n'avez pas encore de compte ?

<a href="signup.html">

Créer un compte

</a>

</div>
