<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zysell - Digital Marketplace</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- Splash Screen -->
<div id="splash">

    <div class="logo">
        Zysell
    </div>

</div>

<!-- Home -->
<section id="home">

    <header>

        <div class="logo-nav">
            Zysell
        </div>

        <div class="language">

            <button id="fr">🇫🇷 FR</button>

            <button id="en">🇬🇧 EN</button>

        </div>

    </header>

    <div class="hero">

        <h1 data-lang="title">
            Bienvenue sur Zysell
        </h1>

        <p data-lang="subtitle">
            La plateforme moderne de vente de produits digitaux.
        </p>

        <button id="startBtn">
            Commencer
        </button>

    </div>

</section>

<script src="lang.js"></script>
<script src="app.js"></script>

</body>

</html>
