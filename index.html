<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zysell | Créez. Vendez. Encaissez.</title>

<meta name="description" content="La plateforme internationale pour vendre et acheter des produits numériques.">

<meta name="theme-color" content="#4F46E5">

<link rel="icon" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#F8FAFC;

color:#1E293B;

overflow-x:hidden;

min-height:100vh;

}

a{
text-decoration:none;
color:inherit;
}

button{
font-family:inherit;
cursor:pointer;
border:none;
outline:none;
}

img{
max-width:100%;
display:block;
}

.container{
width:92%;
max-width:1280px;
margin:auto;
}header{

position:sticky;

top:0;

z-index:1000;

background:#FFFFFF;

box-shadow:0 2px 15px rgba(0,0,0,.05);

}

nav{

height:80px;

display:flex;

align-items:center;

justify-content:space-between;

gap:20px;

}

.logo{

height:48px;

}

.nav-right{

display:flex;

align-items:center;

gap:15px;

flex-wrap:wrap;

}

.select-box{

display:flex;

align-items:center;

gap:8px;

background:#F1F5F9;

padding:10px 15px;

border-radius:12px;

}

.select-box i{

color:#4F46E5;

}

.select-box select{

background:transparent;

border:none;

outline:none;

font-size:15px;

font-weight:600;

cursor:pointer;

}

.country-search{

position:relative;

}

.country-search input{

width:230px;

padding:12px 15px;

border:1px solid #CBD5E1;

border-radius:12px;

outline:none;

font-size:15px;

background:white;

}

.country-list{

position:absolute;

top:55px;

left:0;

width:100%;

max-height:300px;

overflow-y:auto;

background:white;

border-radius:12px;

box-shadow:0 15px 35px rgba(0,0,0,.12);

display:none;

z-index:1001;

}

.country-item{

padding:12px 15px;

cursor:pointer;

transition:.2s;

font-size:15px;

}

.country-item:hover{

background:#EEF2FF;

}

.hero{

display:flex;

align-items:center;

justify-content:center;

text-align:center;

min-height:calc(100vh - 80px);

padding:60px 20px;

}

@media(max-width:768px){

nav{

flex-direction:column;

height:auto;

padding:15px 0;

}

.country-search input{

width:100%;

}

.nav-right{

width:100%;

justify-content:center;

}

}</style>

</head>

<body>

<header>

<div class="container">

<nav>

<a href="index.html">

<img src="logo.png" class="logo" alt="Zysell Logo">

</a>

<div class="nav-right">

<div class="select-box">

<i class="fa-solid fa-language"></i>

<select id="language">

<option value="fr">🇫🇷 Français</option>

<option value="en">🇬🇧 English</option>

</select>

</div>

<div class="country-search">

<input
type="text"
id="countrySearch"
placeholder="🌍 Sélectionnez votre pays">

<div class="country-list" id="countryList">

<!-- Tous les pays du monde seront ajoutés automatiquement par JavaScript,
classés par ordre alphabétique avec recherche instantanée -->

</div>

</div>

</div>

</nav>

</div>

</header>

<section class="hero">

<div class="container">

<div class="hero-content">

<img src="logo.png"
alt="Zysell"
style="width:180px;margin:auto;margin-bottom:35px;">

<h1 id="title">

Créez. Vendez. Encaissez.

</h1>

<p id="subtitle">

La plateforme internationale dédiée à la vente et à l'achat de produits numériques.

</p>

<div class="buttons">

<a href="login.html" class="btn btn-primary">

Se connecter

</a>

<a href="signup.html" class="btn btn-outline">

Créer un compte

</a>

</div>

</div>

</div>

</section>
