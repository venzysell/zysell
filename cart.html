<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panier | Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fc;
color:#222;
}

header{
position:sticky;
top:0;
background:#fff;
display:flex;
align-items:center;
gap:15px;
padding:15px 20px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
z-index:1000;
}

header img{
width:45px;
height:45px;
object-fit:contain;
}

header h2{
color:#0057ff;
font-size:24px;
font-weight:700;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.cart-item{
display:flex;
gap:15px;
background:#fff;
border-radius:18px;
padding:15px;
margin-bottom:18px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
align-items:center;
}

.cart-item img{
width:100px;
height:100px;
border-radius:12px;
object-fit:cover;
}

.item-info{
flex:1;
}

.item-info h3{
margin-bottom:8px;
}

.price{
font-size:22px;
font-weight:700;
color:#0057ff;
margin-bottom:10px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty button{
width:35px;
height:35px;
border:none;
border-radius:50%;
background:#0057ff;
color:#fff;
font-size:18px;
cursor:pointer;
}

.summary{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
margin-top:25px;
}

.summary h2{
margin-bottom:15px;
}

.total{
font-size:28px;
font-weight:700;
color:#0057ff;
margin:15px 0;
}

.checkout{
width:100%;
padding:16px;
border:none;
border-radius:30px;
background:#0057ff;
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
}

</style>

</head><body>

<header>

<img src="logo.png" alt="Logo Zysell">

<h2>Mon panier</h2>

</header>

<div class="container">

<div id="cartItems">

<div class="cart-item">

<img src="logo.png" alt="Produit">

<div class="item-info">

<h3>Produit exemple</h3>

<div class="price">

0 FCFA

</div>

<div class="qty">

<button class="minus">-</button>

<span>1</span>

<button class="plus">+</button>

</div>

</div>

<button class="remove" style="background:red;color:#fff;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;">

🗑

</button>

</div>

</div>

<div class="summary">

<h2>Résumé de la commande</h2>

<p>

Nombre de produits :
<strong id="itemCount">1</strong>

</p>

<div class="total" id="totalPrice">

0 FCFA

</div>

<button class="checkout" id="checkoutBtn">

💳 Passer la commande

</button>

</div>

</div><script>

let cart = JSON.parse(localStorage.getItem("zysell_cart")) || [];

const cartItems = document.getElementById("cartItems");
const itemCount = document.getElementById("itemCount");
const totalPrice = document.getElementById("totalPrice");

function saveCart(){
localStorage.setItem("zysell_cart", JSON.stringify(cart));
}

function renderCart(){

cartItems.innerHTML="";

if(cart.length===0){

cartItems.innerHTML=`
<div class="cart-item">
<div class="item-info">
<h3>Votre panier est vide</h3>
<p>Ajoutez des produits pour commencer vos achats.</p>
</div>
</div>
`;

itemCount.textContent="0";
totalPrice.textContent="0 FCFA";
return;

}

let total=0;
let quantity=0;

cart.forEach((item,index)=>{

total+=item.price*item.qty;
quantity+=item.qty;

cartItems.innerHTML+=`

<div class="cart-item">

<img src="${item.image || 'logo.png'}" alt="${item.name}">

<div class="item-info">

<h3>${item.name}</h3>

<div class="price">

${item.price} FCFA

</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">-</button>

<span>${item.qty}</span>

<button onclick="changeQty(${index},1)">+</button>

</div>

</div>

<button onclick="removeItem(${index})"
style="background:red;color:white;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;">

🗑

</button>

</div>

`;

});

itemCount.textContent=quantity;
totalPrice.textContent=total.toLocaleString()+" FCFA";

}

window.changeQty=function(index,value){

cart[index].qty+=value;

if(cart[index].qty<=0){

cart.splice(index,1);

}

saveCart();

renderCart();

};

window.removeItem=function(index){

cart.splice(index,1);

saveCart();

renderCart();

};

checkoutBtn.onclick=()=>{

if(cart.length===0){

alert("Votre panier est vide.");

return;

}

alert("Le module de paiement sera ajouté prochainement.");

};

renderCart();

</script>

</body>

</html>
