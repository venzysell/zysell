<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer ma boutique | Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1d4ed8,#7c3aed);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

}

.container{

width:100%;
max-width:650px;

background:white;

border-radius:25px;

padding:30px;

box-shadow:0 15px 40px rgba(0,0,0,.25);

}

h1{

text-align:center;

margin-bottom:10px;

color:#1d4ed8;

}

.subtitle{

text-align:center;

color:#666;

margin-bottom:30px;

}

.input-group{

margin-bottom:18px;

}

label{

display:block;

font-weight:600;

margin-bottom:8px;

}

input,
textarea,
select{

width:100%;

padding:15px;

border:1px solid #ddd;

border-radius:12px;

font-size:16px;

outline:none;

}

input:focus,
textarea:focus,
select:focus{

border-color:#1d4ed8;

}

textarea{

min-height:120px;

resize:vertical;

}

button{

width:100%;

padding:16px;

margin-top:20px;

border:none;

border-radius:14px;

background:#1d4ed8;

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#155dfc;

}

.loading{

display:none;

text-align:center;

margin-top:15px;

font-weight:600;

color:#1d4ed8;

}

</style>

</head><body>

<div class="container">

<h1>Créer ma boutique</h1>

<p class="subtitle">
Quelques informations suffisent pour ouvrir votre boutique sur Zysell.
</p>

<form id="storeForm">

<div class="input-group">
<label>Nom de la boutique</label>
<input
type="text"
id="storeName"
placeholder="Ex : Venzy Academy"
required>
</div>

<div class="input-group">
<label>Nom d'utilisateur</label>
<input
type="text"
id="username"
placeholder="Ex : venzyacademy"
required>
</div>

<div class="input-group">
<label>Description</label>
<textarea
id="description"
placeholder="Présentez votre boutique..."
required></textarea>
</div>

<div class="input-group">
<label>Catégorie</label>
<select id="category" required>

<option value="">Choisir une catégorie</option>

<option>Formation</option>

<option>E-commerce</option>

<option>Services</option>

<option>Créateur de contenu</option>

<option>Photographie</option>

<option>Musique</option>

<option>Vidéo</option>

<option>Logiciel</option>

<option>Design</option>

<option>Marketing</option>

<option>Autre</option>

</select>
</div>

<div class="input-group">
<label>Pays</label>
<input
type="text"
id="country"
placeholder="Ex : Cameroon"
required>
</div>

<div class="input-group">
<label>Devise</label>
<select id="currency">

<option>XAF</option>

<option>USD</option>

<option>EUR</option>

<option>GBP</option>

<option>CDF</option>

<option>NGN</option>

</select>
</div>

<button type="submit">

Créer ma boutique

</button>

<div class="loading" id="loading">
Création de votre boutique...
</div>

</form>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAYuh-EnlgQjlqgBO2HFFeC5Y5uH4TrEds",

authDomain:"zysell-86604.firebaseapp.com",

projectId:"zysell-86604",

storageBucket:"zysell-86604.firebasestorage.app",

messagingSenderId:"567755208394",

appId:"1:567755208394:web:754d1eec59cf8a659b2633"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

document.getElementById("storeForm").addEventListener("submit",async(e)=>{

e.preventDefault();

document.getElementById("loading").style.display="block";

const user=auth.currentUser;

if(!user){

alert("Veuillez vous connecter.");

window.location.href="login.html";

return;

}

try{

await addDoc(collection(db,"stores"),{

uid:user.uid,

storeName:document.getElementById("storeName").value.trim(),

username:document.getElementById("username").value.trim().toLowerCase(),

description:document.getElementById("description").value.trim(),

category:document.getElementById("category").value,

country:document.getElementById("country").value.trim(),

currency:document.getElementById("currency").value,

createdAt:serverTimestamp()

});

alert("Boutique créée avec succès !");

window.location.href="home.html";

}catch(error){

document.getElementById("loading").style.display="none";

alert("Erreur : "+error.message);

console.error(error);

}

});

</script>

</body>
</html>
