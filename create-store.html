<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer ma boutique | Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0057ff,#4f46e5,#7c3aed);

min-height:100vh;

padding:25px;

}

.container{

max-width:760px;

margin:auto;

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:0 15px 45px rgba(0,0,0,.18);

}

.header{

background:linear-gradient(135deg,#0057ff,#4f46e5);

padding:35px 25px;

text-align:center;

color:white;

}

.logo{

width:90px;

height:90px;

object-fit:contain;

display:block;

margin:auto;

}

.header h1{

margin-top:18px;

font-size:30px;

font-weight:700;

}

.header p{

margin-top:8px;

opacity:.95;

font-size:16px;

}

.content{

padding:30px;

}

.input-group{

margin-bottom:20px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

color:#222;

}

input,
textarea,
select{

width:100%;

padding:15px;

border:1px solid #ddd;

border-radius:14px;

font-size:16px;

outline:none;

transition:.25s;

}

input:focus,
textarea:focus,
select:focus{

border-color:#0057ff;

}

textarea{

resize:vertical;

min-height:120px;

}

.upload-box{

border:2px dashed #0057ff;

border-radius:18px;

padding:25px;

text-align:center;

cursor:pointer;

background:#f8faff;

}

.preview{

display:none;

margin-top:15px;

}

.preview img{

width:100%;

border-radius:18px;

}

.row{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:15px;

background:linear-gradient(135deg,#0057ff,#4f46e5);

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

}

.loading{

display:none;

text-align:center;

margin-top:15px;

font-weight:600;

color:#0057ff;

}

@media(max-width:700px){

.row{

grid-template-columns:1fr;

}

.content{

padding:20px;

}

}

</style>

</head><body>

<div class="container">

<div class="header">

<img src="logo.png" class="logo" alt="Logo Zysell">

<h1>Créer ma boutique</h1>

<p>Créez votre boutique et commencez à vendre sur Zysell.</p>

</div>

<div class="content">

<form id="storeForm">

<div class="input-group">

<label>Logo de la boutique</label>

<label class="upload-box">

📷 Cliquez pour choisir un logo

<input
type="file"
id="storeLogo"
accept="image/*"
hidden>

</label>

<div class="preview" id="logoPreview">

<img id="logoImage" alt="Logo">

</div>

</div>

<div class="input-group">

<label>Bannière de la boutique</label>

<label class="upload-box">

🖼️ Cliquez pour choisir une bannière

<input
type="file"
id="storeBanner"
accept="image/*"
hidden>

</label>

<div class="preview" id="bannerPreview">

<img id="bannerImage" alt="Bannière">

</div>

</div>

<div class="input-group">

<label>Nom de la boutique</label>

<input
type="text"
id="storeName"
placeholder="Ex : Venzy Academy"
required>

</div>

<div class="input-group">

<label>Nom d'utilisateur</label>

<input
type="text"
id="username"
placeholder="@venzyacademy"
required>

</div>

<div class="input-group">

<label>Description</label>

<textarea
id="description"
placeholder="Présentez votre boutique..."
required></textarea>

</div>

<div class="row">

<div class="input-group">

<label>Catégorie</label>

<select id="category" required>

<option value="">Choisir une catégorie</option>

<option>Formation</option>

<option>E-commerce</option>

<option>Services</option>

<option>Photographie</option>

<option>Vidéo</option>

<option>Musique</option>

<option>Logiciel</option>

<option>Marketing</option>

<option>Autre</option>

</select>

</div>

<div class="input-group">

<label>Pays</label>

<input
type="text"
id="country"
readonly>

</div>

</div>

<div class="row">

<div class="input-group">

<label>Devise</label>

<input
type="text"
id="currency"
readonly>

</div>

<div class="input-group">

<label>Langue</label>

<select id="language">

<option value="fr">Français</option>

<option value="en">English</option>

</select>

</div>

</div>

<button type="submit">

Créer ma boutique

</button>

<div class="loading" id="loading">

Création de votre boutique...

</div>

</form><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyAYuh-EnlgQjlqgBO2HFFeC5Y5uH4TrEds",

authDomain:"zysell-86604.firebaseapp.com",

projectId:"zysell-86604",

storageBucket:"zysell-86604.firebasestorage.app",

messagingSenderId:"567755208394",

appId:"1:567755208394:web:754d1eec59cf8a659b2633"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

/* Aperçu logo */

storeLogo.onchange=()=>{

const file=storeLogo.files[0];

if(file){

logoPreview.style.display="block";

logoImage.src=URL.createObjectURL(file);

}

};

/* Aperçu bannière */

storeBanner.onchange=()=>{

const file=storeBanner.files[0];

if(file){

bannerPreview.style.display="block";

bannerImage.src=URL.createObjectURL(file);

}

};

/* Détection pays */

fetch("https://ipapi.co/json/")

.then(r=>r.json())

.then(data=>{

country.value=data.country_name||"";

currency.value=data.currency||"";

})

.catch(()=>{});

/* Création boutique */

storeForm.addEventListener("submit",async(e)=>{

e.preventDefault();

loading.style.display="block";

const user=auth.currentUser;

if(!user){

alert("Veuillez vous connecter.");

location.href="login.html";

return;

}

try{

await addDoc(collection(db,"stores"),{

uid:user.uid,

storeName:storeName.value,

username:username.value.toLowerCase(),

description:description.value,

category:category.value,

country:country.value,

currency:currency.value,

language:language.value,

createdAt:serverTimestamp()

});

alert("Boutique créée avec succès !");

location.href="home.html";

}catch(error){

loading.style.display="none";

alert(error.message);

}

});

</script>

</div>

</div>

</body>

</html>
