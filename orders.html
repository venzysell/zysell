<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Commandes - Zysell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fc;
}

header{
background:#0057ff;
color:white;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

header img{
width:42px;
height:42px;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.container{
padding:25px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h4{
color:#777;
margin-bottom:10px;
}

.card h2{
color:#0057ff;
}

.table{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr 1fr;
padding:15px;
border-bottom:1px solid #eee;
align-items:center;
}

.head{
background:#0057ff;
color:white;
font-weight:600;
}

.status{
padding:6px 12px;
border-radius:30px;
font-size:13px;
text-align:center;
font-weight:600;
}

.pending{
background:#fff4d6;
color:#b8860b;
}

.paid{
background:#dff7df;
color:#138000;
}

.shipped{
background:#d9ebff;
color:#0057ff;
}

.delivered{
background:#d6ffe3;
color:#008a3b;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
background:#0057ff;
color:white;
cursor:pointer;
}

@media(max-width:800px){

.row{
grid-template-columns:1fr;
gap:10px;
}

}

</style>

</head><body>

<header>

<div class="brand">

<img src="logo.png" alt="Logo Zysell">

<h2>Zysell</h2>

</div>

<button onclick="location.href='dashboard.html'">

🏠 Tableau de bord

</button>

</header>

<div class="container">

<div class="stats">

<div class="card">

<h4>Total des commandes</h4>

<h2 id="totalOrders">

0

</h2>

</div>

<div class="card">

<h4>En attente</h4>

<h2 id="pendingOrders">

0

</h2>

</div>

<div class="card">

<h4>Livrées</h4>

<h2 id="deliveredOrders">

0

</h2>

</div>

<div class="card">

<h4>Chiffre d'affaires</h4>

<h2 id="totalRevenue">

0 FCFA

</h2>

</div>

</div>

<div class="table">

<div class="row head">

<div>Client</div>

<div>Montant</div>

<div>Statut</div>

<div>Date</div>

<div>Action</div>

</div>

<div id="ordersList">

<div class="row">

<div>Chargement...</div>

<div>--</div>

<div>

<span class="status pending">

...

</span>

</div>

<div>--</div>

<div>

<button>

Voir

</button>

</div>

</div>

</div>

</div>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAYuh-EnlgQjlqgBO2HFFeC5Y5uH4TrEds",
authDomain:"zysell-86604.firebaseapp.com",
projectId:"zysell-86604",
storageBucket:"zysell-86604.firebasestorage.app",
messagingSenderId:"567755208394",
appId:"1:567755208394:web:754d1eec59cf8a659b2633"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

const q = query(
collection(db,"orders"),
where("sellerId","==",user.uid)
);

const snap = await getDocs(q);

totalOrders.textContent = snap.size;

let pending = 0;
let delivered = 0;
let revenue = 0;

ordersList.innerHTML = "";

if(snap.empty){

ordersList.innerHTML = `
<div class="row">
<div>Aucune commande</div>
<div>-</div>
<div><span class="status pending">Aucune</span></div>
<div>-</div>
<div>-</div>
</div>
`;

return;

}

snap.forEach(doc=>{

const order = doc.data();

if(order.status==="En attente") pending++;

if(order.status==="Livrée") delivered++;

revenue += Number(order.total || 0);

let css = "pending";

if(order.status==="Payée") css="paid";
if(order.status==="Expédiée") css="shipped";
if(order.status==="Livrée") css="delivered";

ordersList.innerHTML += `

<div class="row">

<div>${order.customerName || "Client"}</div>

<div>${order.total || 0} FCFA</div>

<div>

<span class="status ${css}">

${order.status || "En attente"}

</span>

</div>

<div>${order.date || "-"}</div>

<div>

<button onclick="viewOrder('${doc.id}')">

Voir

</button>

</div>

</div>

`;

});

pendingOrders.textContent = pending;
deliveredOrders.textContent = delivered;
totalRevenue.textContent = revenue + " FCFA";

});

window.viewOrder = (id)=>{

alert("Détails de la commande : " + id);

};

</script>

</body>

</html>
